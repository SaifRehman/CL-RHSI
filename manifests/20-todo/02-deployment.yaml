apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: demo-todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
        - name: app
          image: quay.io/rh-ee-srehman/todo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: db-creds
          env:
            - name: ALLOWED_ORIGIN
              value: https://app.travels.sandbox3259.opentlc.com
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
